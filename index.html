<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <title>TILSNA Service Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- iPad / iPhone Home Screen Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="https://admintilsna.github.io/tilsna-assets/tilsna-icon-180.png?v=3">
  <link rel="icon" type="image/png" sizes="512x512" href="https://admintilsna.github.io/tilsna-assets/tilsna-icon-512.png?v=3">
  <link rel="shortcut icon" href="https://admintilsna.github.io/tilsna-assets/tilsna-icon-512.png?v=3">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="TILSNA Service Hub">
  <meta name="application-name" content="TILSNA Service Hub">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#1f4388">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(31, 67, 136, 0.10), transparent 35%),
        linear-gradient(180deg, #ffffff 0%, #f4f8ff 100%);
      color: #1f4388;
      text-align: center;
    }

    .box {
      width: min(92vw, 430px);
      padding: 34px 26px;
      background: rgba(255, 255, 255, 0.95);
      border: 1px solid #e3ebf4;
      border-radius: 30px;
      box-shadow: 0 18px 42px rgba(31, 67, 136, 0.14);
    }

    img {
      width: 190px;
      max-width: 78vw;
      margin-bottom: 18px;
      border-radius: 28px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
      font-weight: 900;
      color: #1f4388;
    }

    p {
      margin: 0 0 20px;
      font-size: 15px;
      color: #475569;
      font-weight: 700;
      line-height: 1.6;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      background: #1f4388;
      color: #ffffff;
      border-radius: 999px;
      padding: 13px 26px;
      font-size: 15px;
      font-weight: 900;
      box-shadow: 0 10px 22px rgba(31, 67, 136, 0.22);
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
    }
  </style>

  <script>
    const WEBAPP_URL = 'https://script.google.com/macros/s/AKfycbzwsk5df73lSygVNjc6g3N0B9VDnRaWka2BCN2gYOuu-2hSjRUwwi86P1hqaxk09nYjYA/exec';

    function isStandaloneMode() {
      return window.navigator.standalone === true ||
             window.matchMedia('(display-mode: standalone)').matches;
    }

    document.addEventListener('DOMContentLoaded', function () {
      const openBtn = document.getElementById('openAppBtn');

      if (openBtn) {
        openBtn.href = WEBAPP_URL;
      }

      if (isStandaloneMode()) {
        window.location.replace(WEBAPP_URL);
      }
    });
  </script>
</head>

<body>
  <div class="box">
    <img src="https://admintilsna.github.io/tilsna-assets/tilsna-icon-512.png?v=3" alt="TILSNA Logo">
    <h1>TILSNA Service Hub</h1>
    <p>ระบบจองห้องประชุม จองรถยนต์สำนักงาน และข้อมูลเจ้าหน้าที่</p>

    <a id="openAppBtn" class="btn" href="#">
      เปิดระบบ
    </a>

    <div class="hint">
      สำหรับ iPhone/iPad: เปิดหน้านี้ด้วย Safari แล้วกด Share &gt; Add to Home Screen
    </div>
  </div>
</body>
</html>
